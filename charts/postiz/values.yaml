replicaCount: 1

image:
  repository: oci://xtremeverveacr.azurecr.io/postiz
  tag: origin-main-16-20250608-0153
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
  hosts:
    - host: social-scheduler.xtremeverve.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - social-scheduler.xtremeverve.com
      secretName: social-scheduler-tls

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

postgresql:
  enabled: true
  auth:
    username: postiz
    password: postiz
    database: postiz
  primary:
    persistence:
      enabled: true
      size: 8Gi

redis:
  enabled: true
  architecture: standalone
  master:
    persistence:
      enabled: true
      size: 8Gi
  auth:
    enabled: false

