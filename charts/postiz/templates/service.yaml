apiVersion: v1
kind: Service
metadata:
  name: {{ include "postiz.name" . }}
  labels:
    {{- include "postiz.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "postiz.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
      protocol: TCP
      name: http
